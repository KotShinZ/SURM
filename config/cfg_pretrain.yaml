# ARC training config

defaults:
  - arch: urm
  - _self_

hydra:
  output_subdir: null

# Data path
data_path: data/arc-aug-1000

evaluators:
  - name: arc@ARC

# Hyperparams - Training
global_batch_size: 768
grad_accum_steps: 1

epochs: 200000
eval_interval: 10
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

target_q_update_every: 4

# Standard hyperparameter settings for LM, as used in Llama
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

# Hyperparams - Puzzle embeddings training
puzzle_emb_lr: 1e-2

use_muon: False

# Fraction of training groups to use per epoch (1.0 = all, 0.5 = half)
data_fraction: 1.0

# Online augmentation: applied randomly per sample at training time.
# Detected automatically from seq_len: 900 → ARC-AGI, 81 → Sudoku.
# Set enabled: true to activate.
online_aug:
  enabled: false
  # ARC-AGI: dihedral symmetry (8 rotations/reflections)
  arc_dihedral: true
  # ARC-AGI: random permutation of the 10 color tokens
  arc_color_perm: true
  # Sudoku: random permutation of digits 1-9
  sudoku_digit_perm: true
  # Sudoku: random row/column/band permutation (preserves Sudoku validity)
  sudoku_row_col_perm: true
  # Sudoku: random transpose (swap rows ↔ columns)
  sudoku_transpose: true
