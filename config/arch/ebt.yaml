name: ebt.ebt_puzzle@EBTPuzzle
loss:
  name: ebt.ebt_puzzle@EBTLossHead
  loss_type: stablemax_cross_entropy

# Architecture (matching URM sudoku hyperparameters)
num_layers: 4
hidden_size: 512
num_heads: 8
expansion: 4

# EBT-specific
mcmc_num_steps: 12       # Training MCMC steps (≈ URM H_cycles * L_cycles = 2 * 6)
mcmc_step_size: 100.0    # Learnable initial step size (alpha)
mcmc_step_size_learnable: true
truncate_mcmc: true      # Only last step gets gradients (like URM truncated BPTT)
denoising_initial_condition: zeros

# Inference
loops: 16                # MCMC steps at inference time (matches URM)
loop_deltas: [0, 4]

# Puzzle embeddings
puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope
